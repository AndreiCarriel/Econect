<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styleDash.css">
</head>
<body>

<header class="topo">
    <h1>Dashboard</h1>
</header>

<div class="container">

    <aside class="menu">
        <h2>Menu</h2>
        <ul>
            <li>Início</li>
            <li>Relatórios</li>
            <li>Usuários</li>
            <li>Configurações</li>
        </ul>
    </aside>

    <main class="conteudo">
        <h2>Visão Geral</h2>

        <div class="cards">
            <div class="card">
                <h3>Usuários</h3>
                <p>120</p>
            </div>

            <div class="card">
                <h3>Vendas</h3>
                <p>R$ 3.500</p>
            </div>

            <div class="card">
                <h3>Pedidos</h3>
                <p>75</p>
            </div>
        </div>

        <section class="tabela">
            <h2>Últimas Atividades</h2>

            <table>
                <tr>
                    <th>Usuário</th>
                    <th>Ação</th>
                    <th>Data</th>
                </tr>
                <tr>
                    <td>João</td>
                    <td>Compra</td>
                    <td>25/04</td>
                </tr>
                <tr>
                    <td>Maria</td>
                    <td>Cadastro</td>
                    <td>24/04</td>
                </tr>
            </table>
        </section>

    </main>

</div>

</body>
</html>
